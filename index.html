<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTION | ASIDI</title>
    <!-- 引入最接近《纽约时报》报头的复古哥特体，以及纽时新闻正文的经典报业衬线体 -->
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* 1. 纯黑底色与经典报业印刷白字对比 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            /* 全局默认采用纽时新闻正文风格的优雅衬线体 */
            font-family: 'Playfair Display', 'Georgia', serif; 
            letter-spacing: 1px;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 顶部导航栏：经典庄重布局 */
        header {
            padding: 35px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1c1c1c; /* 极细暗调分割线 */
        }

        /* 品牌 LOGO：精准重现《纽约时报》报头那种厚重的哥特艺术感 */
        .brand-logo {
            font-family: 'UnifrakturMaguntia', cursive; 
            font-size: 40px; 
            text-decoration: none;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .nav-links a {
            margin-left: 35px;
            text-decoration: none;
            color: #aaaaaa;
            font-size: 14px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        .nav-links a:hover { 
            color: #ffffff;
        }

        /* 3. 商品货架布局 */
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        /* 主标题使用纽时哥特体 */
        .collection-title {
            text-align: center;
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 46px;
            margin-bottom: 70px;
            font-weight: 400;
            color: #ffffff;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 50px;
        }

        .product-card {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards ease;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 商品图片框：深邃全黑，凸显大片 */
        .product-image-wrapper {
            background-color: #080808;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 3 / 4;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #161616;
            transition: border-color 0.4s ease;
        }
        .product-card:hover .product-image-wrapper {
            border-color: #333333;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }
        .product-card:hover img {
            transform: scale(1.02);
        }

        /* 商品名称：采用充满旧时代诗意与力量感的哥特体 */
        .product-name {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 24px; /* 哥特体带有独特的舒展感 */
            margin: 15px 0 8px 0;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* 商品价格：经典的斜体印刷报纸风，高级且清晰 */
        .product-price {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 15px;
            color: #888888;
            margin-bottom: 20px;
        }

        /* 4. 极致内敛的白金主义购买按钮 */
        .buy-btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 12px 40px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid #ffffff;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        .buy-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <!-- 完美的纽时哥特体 LOGO -->
        <a href="#" class="brand-logo">Asidi</a>
        <div class="nav-links">
            <a href="#">Shop</a>
            <a href="#">Story</a>
            <a href="#">Contact</a>
        </div>
    </header>

    <div class="container">
        <!-- 时代周刊/大报质感的暗黑大标题 -->
        <h2 class="collection-title">The Chronicle</h2>
        
        <!-- 自动渲染数据的大盒子 -->
        <div class="product-grid" id="gridBox"></div>
    </div>

    <script>
        // 动态读取同级目录下的 products.json
        fetch('products.json')
            .then(response => response.json())
            .then(products => {
                const gridBox = document.getElementById('gridBox');
                
                products.forEach((product, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.style.animationDelay = `${index * 0.15}s`; 
                    
                    card.innerHTML = `
                        <div class="product-image-wrapper">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                        <a href="${product.link}" class="buy-btn" target="_blank">Inquire / Buy</a>
                    `;
                    
                    gridBox.appendChild(card);
                });
            })
            .catch(error => console.error('读取纽时风商品账本失败:', error));
    </script>

</body>
</html>
