<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTION | ASIDI</title>
    <style>
        /* 奢侈品核心：极简黑白、高级留白与古典衬线字体 */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #111111;
            font-family: "Didot", "Bodoni MT", "Cinzel", "Times New Roman", serif;
            letter-spacing: 2px;
        }

        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
        }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #000; }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .collection-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 60px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* 存放商品的网格大盒子 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            text-align: center;
            opacity: 0; /* 初始隐藏，配合动画 */
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards ease;
        }

        /* 优雅的入场动效 */
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-image-wrapper {
            background-color: #f9f9f9;
            overflow: hidden;
            margin-bottom: 15px;
            aspect-ratio: 3 / 4;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .product-card:hover img {
            transform: scale(1.03);
        }

        .product-name {
            font-size: 14px;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            font-weight: 400;
        }

        .product-price {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
        }

        .buy-btn {
            display: inline-block;
            background-color: #111111;
            color: #ffffff;
            padding: 10px 30px;
            font-size: 12px;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid #111111;
            transition: all 0.3s ease;
        }
        .buy-btn:hover {
            background-color: #ffffff;
            color: #111111;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="brand-logo">ASIDI</a>
        <div class="nav-links">
            <a href="#">Shop</a>
            <a href="#">Story</a>
            <a href="#">Contact</a>
        </div>
    </header>

    <div class="container">
        <h2 class="collection-title">The New Collection</h2>
        
        <!-- 核心：这个盒子原本是空的，JavaScript 会自动往里面塞商品 -->
        <div class="product-grid" id="gridBox"></div>
    </div>

    <script>
        // 核心黑魔法：异步读取你的 json 账本文件
        fetch('products.json')
            .then(response => response.json())
            .then(products => {
                const gridBox = document.getElementById('gridBox');
                
                // 循环账本里的每一个商品，动态织出 HTML 代码
                products.forEach((product, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    // 让商品卡片错开时间优雅入场
                    card.style.animationDelay = `${index * 0.15}s`; 
                    
                    card.innerHTML = `
                        <div class="product-image-wrapper">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                        <a href="${product.link}" class="buy-btn" target="_blank">Inquire / Buy</a>
                    `;
                    
                    gridBox.appendChild(card);
                });
            })
            .catch(error => console.error('读取商品账本失败:', error));
    </script>

</body>
</html>
