<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在售 | ANDSEETHINGSASIDO</title>
    <!-- 引入纽时报头风格的复古哥特体，以及经典报业衬线体 -->
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* 1. 纯黑底色与经典印刷质感 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Playfair Display', 'Georgia', "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif; 
            letter-spacing: 1px;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 顶部导航栏（电脑端样式） */
        header {
            padding: 35px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1c1c1c; 
        }

        /* 品牌 LOGO：升级为极具冲击力的全大写哥特品牌名 */
        .brand-logo {
            font-family: 'UnifrakturMaguntia', cursive; 
            font-size: 32px; 
            text-decoration: none;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase; 
        }

        .nav-links a {
            margin-left: 35px;
            text-decoration: none;
            color: #aaaaaa;
            font-size: 14px;
            letter-spacing: 2px;
            transition: color 0.3s ease;
            cursor: pointer;
        }
        .nav-links a:hover { 
            color: #ffffff;
        }

        /* 3. 商品货架布局（电脑端样式） */
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .collection-title {
            text-align: center;
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 46px;
            margin-bottom: 70px;
            font-weight: 400;
            color: #ffffff;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 50px;
        }

        .product-card {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards ease;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-image-wrapper {
            background-color: #080808;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 3 / 4;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #161616;
            transition: border-color 0.4s ease;
        }
        .product-card:hover .product-image-wrapper {
            border-color: #333333;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }
        .product-card:hover img {
            transform: scale(1.02);
        }

        .product-name {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 26px; 
            margin: 15px 0 8px 0;
            color: #ffffff;
        }

        .product-price {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 15px;
            color: #888888;
            margin-bottom: 20px;
        }

        .buy-btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 12px 40px;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            border: 1px solid #ffffff;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        .buy-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        /* 4. 二维码弹窗系统 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(8px); 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #0a0a0a;
            border: 1px solid #222222;
            padding: 40px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.4s ease;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 28px;
            margin-bottom: 25px;
            color: #ffffff;
        }

        .qrcode-img {
            width: 200px;
            height: 200px;
            background-color: #ffffff; 
            padding: 10px;
            box-sizing: border-box;
            object-fit: contain;
            margin: 0 auto 20px auto;
            display: block;
        }

        .modal-desc {
            font-size: 12px;
            color: #666666;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            color: #555555;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-btn:hover {
            color: #ffffff;
        }

        /* ==========================================
           🚨 手机端高定制修改（单列大气大图尺寸）
           ========================================== */
        @media screen and (max-width: 768px) {
            header {
                padding: 25px 20px;
                flex-direction: column; 
                gap: 15px;
            }

            .brand-logo {
                font-size: 18px; 
                letter-spacing: 1px;
                text-align: center;
            }

            .nav-links a {
                margin: 0 15px; 
                font-size: 13px;
            }

            .container {
                margin: 30px auto;
                padding: 0 20px;
            }

            .collection-title {
                font-size: 32px;
                margin-bottom: 40px;
            }

            .product-grid {
                grid-template-columns: 1fr; 
                gap: 45px; 
            }

            .product-image-wrapper {
                margin-bottom: 15px;
            }

            .product-name {
                font-size: 24px; 
                margin: 15px 0 6px 0;
            }

            .product-price {
                font-size: 14px;
                margin-bottom: 15px;
            }

            .buy-btn {
                padding: 12px 40px;
                font-size: 12px;
                width: auto; 
                display: inline-block;
            }

            .modal-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="brand-logo">ANDSEETHINGSASIDO</a>
        <div class="nav-links">
            <a href="#">商店</a>
            <a href="#">故事</a>
            <a id="connectTrigger">联系</a>
        </div>
    </header>

    <div class="container">
        <!-- 核心修改：大标题已变更为在售 -->
        <h2 class="collection-title">在售</h2>
        
        <!-- 商品网格 -->
        <div class="product-grid" id="gridBox"></div>
    </div>

    <!-- 二维码弹窗 -->
    <div class="modal-overlay" id="qrcodeModal">
        <div class="modal-content">
            <span class="close-btn" id="closeTrigger">&times;</span>
            <div class="modal-title">Contact</div>
            <img src="qrcode.png" alt="联系微信二维码" class="qrcode-img">
            <div class="modal-desc">扫描上方二维码<br>向主理人发起主线咨询或定制采购</div>
        </div>
    </div>

    <script>
        // A. 动态读取 products.json 渲染货架
        fetch('products.json')
            .then(response => response.json())
            .then(products => {
                const gridBox = document.getElementById('gridBox');
                
                products.forEach((product, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.style.animationDelay = `${index * 0.15}s`; 
                    
                    card.innerHTML = `
                        <div class="product-image-wrapper">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                        <a href="${product.link}" class="buy-btn" target="_blank">了解 / 购买</a>
                    `;
                    
                    gridBox.appendChild(card);
                });
            })
            .catch(error => console.error('读取商品数据失败:', error));

        // B. 控制二维码弹窗的逻辑代码
        const modal = document.getElementById('qrcodeModal');
        const openBtn = document.getElementById('connectTrigger');
        const closeBtn = document.getElementById('closeTrigger');

        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>

</body>
</html>
