<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTION | ASIDI</title>
    <!-- 引入 Google 免费且稳定的克罗心同款高街哥特字体库 -->
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. 暗黑高街奢品风格：全黑背景，白色强对比 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Cinzel', serif; /* 默认英文采用古典衬线 */
            letter-spacing: 2px;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 导航栏修改：融入哥特元素 */
        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a; /* 暗灰色细线 */
        }

        /* 品牌 LOGO 赋予强烈的克罗心哥特体灵魂 */
        .brand-logo {
            font-family: 'UnifrakturMaguntia', cursive; 
            font-size: 36px; /* 哥特体适当放大更有张力 */
            text-transform: uppercase;
            text-decoration: none;
            color: #ffffff;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: #888888;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .nav-links a:hover { 
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* 3. 商品货架布局 */
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        /* 大标题使用哥特体 */
        .collection-title {
            text-align: center;
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 40px;
            margin-bottom: 60px;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 3px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards ease;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 商品图片框：深邃的暗黑背景 */
        .product-image-wrapper {
            background-color: #0a0a0a;
            overflow: hidden;
            margin-bottom: 15px;
            aspect-ratio: 3 / 4;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #111111;
            transition: border-color 0.4s;
        }
        .product-card:hover .product-image-wrapper {
            border-color: #333333; /* 悬停时边框微亮 */
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, filter 0.6s ease;
            filter: grayscale(20%); /* 略微降低饱和度，更有高冷摇滚感 */
        }
        .product-card:hover img {
            transform: scale(1.03);
            filter: grayscale(0%);
        }

        /* 商品名字 */
        .product-name {
            font-size: 14px;
            margin: 18px 0 6px 0;
            text-transform: uppercase;
            font-weight: 400;
            color: #ffffff;
        }

        /* 商品价格 */
        .product-price {
            font-size: 13px;
            color: #666666;
            margin-bottom: 18px;
        }

        /* 4. 克罗心风银质/反色购买按钮 */
        .buy-btn {
            display: inline-block;
            background-color: #ffffff; /* 反色设计：黑底白按钮 */
            color: #000000;
            padding: 12px 35px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid #ffffff;
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }
        .buy-btn:hover {
            background-color: #000000;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <!-- 这里的 LOGO 已经是华丽的哥特体 -->
        <a href="#" class="brand-logo">Asidi</a>
        <div class="nav-links">
            <a href="#">Shop</a>
            <a href="#">Story</a>
            <a href="#">Contact</a>
        </div>
    </header>

    <div class="container">
        <!-- 华丽暗黑的主题大标题 -->
        <h2 class="collection-title">The Dark Collection</h2>
        
        <!-- 商品的核心动力舱 -->
        <div class="product-grid" id="gridBox"></div>
    </div>

    <script>
        // 动态读取你的 products.json 账本
        fetch('products.json')
            .then(response => response.json())
            .then(products => {
                const gridBox = document.getElementById('gridBox');
                
                products.forEach((product, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.style.animationDelay = `${index * 0.15}s`; 
                    
                    card.innerHTML = `
                        <div class="product-image-wrapper">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                        <a href="${product.link}" class="buy-btn" target="_blank">Inquire / Buy</a>
                    `;
                    
                    gridBox.appendChild(card);
                });
            })
            .catch(error => console.error('读取暗黑商品账本失败:', error));
    </script>

</body>
</html>
